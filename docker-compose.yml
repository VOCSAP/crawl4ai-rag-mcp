services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-rag
    restart: unless-stopped
    # Server-side guard-rails matching the client-side connection pool in src/utils.py:
    #   - max_connections=200 leaves headroom while the pool caps itself at 10 by default.
    #   - idle_in_transaction_session_timeout=60s reclaims slots from clients that
    #     died mid-transaction (typical of an abruptly disconnected SSE session).
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "idle_in_transaction_session_timeout=60000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rag}
      - POSTGRES_DB=${POSTGRES_DB:-ragdb}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./crawled_pages.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - searxng
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # MCP Crawl4AI Server
  mcp-crawl4ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-crawl4ai
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      - TRANSPORT=${TRANSPORT:-streamable-http}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8051}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      # The local CrossEncoder reranker model is baked into the image at build
      # time (see Dockerfile), so HF_HUB_OFFLINE=1 cuts all HF network round-trips
      # at load time without any host-side cache. Combined with the in-process
      # singleton (_get_local_reranker), the model loads once per process.
      # If RERANKING_MODEL changes, rebuild with a matching
      # --build-arg RERANKING_MODEL=... (the baked model is build-time fixed).
      - HF_HOME=/app/hf_cache
      - HF_HUB_OFFLINE=1
    env_file:
      - .env
    ports:
      - "8051:8051"
    depends_on:
      - searxng
      - postgres
    networks:
      - searxng
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # No hf_cache bind mount: the reranker model is baked into the image at
      # build time (see Dockerfile). A host bind mount here would shadow the
      # baked /app/hf_cache with an empty dir and break offline rerank.
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # Reverse Proxy (Caddy) -- disabled by default, NPM handles the reverse proxy
  # Start manually with: docker compose --profile caddy up -d caddy
  caddy:
    profiles: ["caddy"]
    container_name: caddy
    image: docker.io/library/caddy:2-alpine
    network_mode: host
    restart: unless-stopped
    environment:
      - SEARXNG_HOSTNAME=searxng.home.coreleap.com.br
      - SEARXNG_TLS=${SEARXNG_TLS:-internal}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data:rw
      - caddy-config:/config:rw
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # Redis Alternative - Valkey
  valkey:
    container_name: valkey
    image: valkey/valkey:9.1-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Sao_Paulo}    
    networks:
      - searxng
    volumes:
      - valkey-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # SearXNG Search Engine
  searxng:
    container_name: searxng
    image: searxng/searxng@sha256:b2211b2ad11fc9822ed8d94502a609a862d6587e13f052e18847559586c76b71
    restart: unless-stopped
    networks:
      - searxng
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
      - searxng-data:/var/cache/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://searxng.home.coreleap.com.br/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    depends_on:
      - valkey

networks:
  searxng:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  valkey-data:
  searxng-data:
  pgvector_data: